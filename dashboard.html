<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcciEasy Admin — דשבורד</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      color: #0f172a;
      overflow-x: clip;
      align-items: center;
    }

    /* ── Top bar ─────────────────────────────── */
    .topbar {
      background: #1d4ed8;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .topbar-actions { display: flex; align-items: center; gap: 12px; min-width: 0; overflow: hidden; }

    #repoLabel { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    /* ── Layout ──────────────────────────────── */
    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 60px;
      display: grid;
      gap: 24px;
    }

    /* ── Cards ───────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-icon.blue  { background: #dbeafe; }
    .card-icon.green { background: #dcfce7; }
    .card-icon.gray  { background: #f1f5f9; }

    .card-title { font-size: 17px; font-weight: 800; }
    .card-sub   { font-size: 13px; color: #64748b; margin-top: 2px; }

    /* ── Form fields ─────────────────────────── */
    .field       { margin-bottom: 14px; }
    label        { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s;
      background: #f8fafc;
      font-family: inherit;
      text-align: right;
    }

    textarea { resize: vertical; min-height: 70px; }

    input:focus, textarea:focus { border-color: #1d4ed8; background: #fff; }
    input::placeholder, textarea::placeholder { color: #94a3b8; }

    /* ── Radio group ─────────────────────────── */
    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }

    .radio-option {
      flex: 1;
      min-width: 120px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .radio-option input { display: none; }
    .radio-option:has(input:checked) { border-color: #1d4ed8; background: #eff6ff; }

    .radio-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #cbd5e1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }

    .radio-option:has(input:checked) .radio-dot { border-color: #1d4ed8; }
    .radio-dot::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1d4ed8;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .radio-option:has(input:checked) .radio-dot::after { opacity: 1; }

    /* ── Buttons ─────────────────────────────── */
    .btn-primary {
      padding: 12px 20px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary:hover  { background: #1e40af; }
    .btn-primary:active { background: #1e3a8a; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

    .btn-danger {
      padding: 6px 12px;
      background: transparent;
      color: #ef4444;
      border: 1px solid #fca5a5;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: #fef2f2; }

    .btn-edit {
      padding: 6px 12px;
      background: transparent;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-edit:hover { background: #eff6ff; }

    .edit-mode-banner {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      color: #1e40af;
      margin-bottom: 14px;
      display: none;
      align-items: center;
      justify-content: space-between;
    }
    .btn-cancel-edit {
      background: transparent;
      border: 1px solid #93c5fd;
      color: #1d4ed8;
      border-radius: 7px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Toast / feedback ────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      white-space: nowrap;
    }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }
    .toast.show    { opacity: 1; }

    /* ── Articles list ───────────────────────── */
    #articlesList { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

    .article-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      padding: 10px 14px;
      min-width: 0;
      width: 100%;
    }

    .article-info { flex: 1; min-width: 0; overflow: hidden; }
    .article-headline { font-size: 14px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .article-sub      { font-size: 12px; color: #64748b; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .empty-list {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      padding: 20px 0;
    }

    /* ── Loading spinner ─────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login banner ────────────────────────── */
    .login-banner {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #92400e;
      margin-bottom: 4px;
    }
    .login-banner a { color: #1d4ed8; font-weight: 600; text-decoration: none; }
    .login-banner a:hover { text-decoration: underline; }

    .server-login-row { display: flex; gap: 10px; align-items: flex-end; }
    .server-login-row input { flex: 1; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">🚗 AcciEasy Admin</div>
    <div class="topbar-actions">
      <span id="repoLabel" style="font-size:13px; opacity:0.8;"></span>
      <button class="btn-logout" onclick="logout()">התנתק</button>
    </div>
  </div>

  <div class="container">

    <!-- ── Server login ───────────────────────── -->
    <div class="card" id="serverLoginCard">
      <div class="card-header">
        <div class="card-icon gray">🔐</div>
        <div>
          <div class="card-title">חיבור לשרת</div>
          <div class="card-sub">נדרש לשליחת התראות למשתמשים</div>
        </div>
      </div>
      <div id="tokenStatus"></div>
      <div class="field">
        <label for="adminPassword">סיסמת אדמין</label>
        <div class="server-login-row">
          <input type="text" id="adminPassword" placeholder="הזן סיסמת אדמין" />
          <button class="btn-primary" onclick="serverLogin()">התחבר</button>
        </div>
      </div>
    </div>

    <!-- ── Send Notification ─────────────────── -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon blue">🔔</div>
        <div>
          <div class="card-title">שלח התראה</div>
          <div class="card-sub">התראה תישלח לכל המשתמשים שהתקינו את האפליקציה</div>
        </div>
      </div>

      <div class="field">
        <label>סוג ההתראה</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="notifType" value="general" checked />
            <span class="radio-dot"></span>
            כללי
          </label>
          <label class="radio-option">
            <input type="radio" name="notifType" value="road" />
            <span class="radio-dot"></span>
            כביש
          </label>
        </div>
      </div>

      <div class="field">
        <label for="notifTitle">כותרת</label>
        <input type="text" id="notifTitle" placeholder="כותרת ההתראה" />
      </div>

      <div class="field">
        <label for="notifBody">תוכן</label>
        <textarea id="notifBody" placeholder="תוכן ההתראה..."></textarea>
      </div>

      <button class="btn-primary" id="sendNotifBtn" onclick="sendNotification()">
        שלח התראה
      </button>
    </div>

    <!-- ── Add Article ────────────────────────── -->
    <div class="card" id="addArticleSection">
      <div class="card-header">
        <div class="card-icon green">📰</div>
        <div>
          <div class="card-title">הוסף מאמר</div>
          <div class="card-sub">המאמר יופיע בפיד של האפליקציה</div>
        </div>
      </div>

      <div class="field">
        <label for="artHeadline">כותרת ראשית</label>
        <input type="text" id="artHeadline" placeholder="כותרת המאמר" />
      </div>

      <div class="field">
        <label for="artSubheadline">כותרת משנה</label>
        <textarea id="artSubheadline" placeholder="תיאור קצר של המאמר..." style="min-height:60px;"></textarea>
      </div>

      <div class="field">
        <label for="artImageUrl">קישור לתמונה (URL)</label>
        <input type="url" id="artImageUrl" placeholder="https://..." />
      </div>

      <div class="field">
        <label for="artLink">קישור למאמר</label>
        <input type="url" id="artLink" placeholder="https://..." />
      </div>

      <div id="editModeBanner" class="edit-mode-banner">
        <span>✏️ עורך מאמר קיים</span>
        <button class="btn-cancel-edit" onclick="cancelEdit()">ביטול</button>
      </div>

      <button class="btn-primary" id="addArticleBtn" onclick="addArticle()">
        הוסף מאמר
      </button>
    </div>

    <!-- ── Articles List ──────────────────────── -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon gray">📋</div>
        <div>
          <div class="card-title">מאמרים פורסמו</div>
          <div class="card-sub">ניהול המאמרים הקיימים בפיד</div>
        </div>
      </div>
      <div id="articlesList">
        <div class="empty-list">טוען מאמרים...</div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ── Credentials ───────────────────────────────────────────────────────────
    const githubToken = localStorage.getItem('githubToken');
    const githubRepo  = localStorage.getItem('githubRepo');
    const serverUrl   = localStorage.getItem('serverUrl');
    let   serverToken = localStorage.getItem('serverToken') || '';
    let   editingId        = null;
    let   displayLimit     = 5;
    let   allLoadedArticles = [];
    let   cachedSha        = null;

    if (!githubToken || !githubRepo || !serverUrl) {
      window.location.href = 'index.html';
    }

    document.getElementById('repoLabel').textContent = githubRepo;

    // ── Server token status ───────────────────────────────────────────────────
    function refreshTokenStatus() {
      const el = document.getElementById('tokenStatus');
      if (serverToken) {
        el.innerHTML = '<div class="login-banner" style="background:#f0fdf4;border-color:#86efac;color:#166534;">✓ מחובר לשרת — שליחת התראות מופעלת</div>';
      } else {
        el.innerHTML = '<div class="login-banner">⚠️ לא מחובר לשרת — הזן סיסמת אדמין כדי לשלוח התראות.</div>';
      }
    }
    refreshTokenStatus();

    async function serverLogin() {
      const password = document.getElementById('adminPassword').value.trim();
      if (!password) { showToast('הזן סיסמה', 'error'); return; }
      try {
        const res = await fetch(`${serverUrl}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (!res.ok) { showToast('סיסמה שגויה', 'error'); return; }
        const data = await res.json();
        serverToken = data.token;
        localStorage.setItem('serverToken', serverToken);
        document.getElementById('adminPassword').value = '';
        refreshTokenStatus();
        showToast('התחברת בהצלחה', 'success');
      } catch (e) {
        showToast(`שגיאת חיבור: ${e.message}`, 'error');
      }
    }

    // ── Send notification via server ──────────────────────────────────────────
    async function sendNotification() {
      if (!serverToken) { showToast('יש להתחבר לשרת תחילה', 'error'); return; }

      const type  = document.querySelector('input[name="notifType"]:checked').value;
      const title = document.getElementById('notifTitle').value.trim();
      const body  = document.getElementById('notifBody').value.trim();

      if (!title || !body) { showToast('מלא כותרת ותוכן', 'error'); return; }

      const btn = document.getElementById('sendNotifBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> שולח...';

      try {
        const res = await fetch(`${serverUrl}/admin/notify`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${serverToken}`,
          },
          body: JSON.stringify({ title, body, type }),
        });

        if (res.status === 401) {
          serverToken = '';
          localStorage.removeItem('serverToken');
          refreshTokenStatus();
          showToast('הסשן פג — התחבר מחדש', 'error');
          return;
        }

        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        showToast(`ההתראה נשלחה ל-${data.sent ?? 0} מכשירים`, 'success');
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifBody').value  = '';
      } catch (e) {
        showToast(`שגיאה: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'שלח התראה';
      }
    }

    // ── GitHub API helpers ────────────────────────────────────────────────────
    const GITHUB_API = `https://api.github.com/repos/${githubRepo}/contents/articles.json`;

    async function readArticlesFile() {
      const res = await fetch(GITHUB_API, {
        headers: {
          'Authorization': `Bearer ${githubToken}`,
          'Accept': 'application/vnd.github.v3+json',
        },
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const file = await res.json();
      cachedSha = file.sha;
      const raw = atob(file.content.replace(/\n/g, ''));
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    async function writeArticlesFile(articles) {
      const json = JSON.stringify(articles, null, 2);
      const bytes = new TextEncoder().encode(json);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const encoded = btoa(binary);
      const res = await fetch(GITHUB_API, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${githubToken}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `Update articles (${new Date().toISOString()})`,
          content: encoded,
          sha: cachedSha,
        }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `GitHub API ${res.status}`);
      }
      const data = await res.json();
      cachedSha = data.content.sha;
    }

    // ── Load and render articles ──────────────────────────────────────────────
    async function loadArticles() {
      const list = document.getElementById('articlesList');
      list.innerHTML = '<div class="empty-list">טוען מאמרים...</div>';
      try {
        const articles = await readArticlesFile();
        displayLimit = 5;
        allLoadedArticles = articles;
        renderArticles();
      } catch (e) {
        list.innerHTML = `
          <div class="empty-list" style="color:#ef4444; margin-bottom:10px;">שגיאה בטעינת מאמרים: ${escapeHtml(e.message)}</div>
          <button class="btn-primary" onclick="loadArticles()" style="width:100%;">נסה שוב</button>
        `;
      }
    }

    function renderArticles() {
      const list = document.getElementById('articlesList');
      const articles = allLoadedArticles;
      if (!articles.length) {
        list.innerHTML = '<div class="empty-list">אין מאמרים עדיין</div>';
        return;
      }
      const visible = articles.slice(0, displayLimit);
      const hasMore = displayLimit < articles.length;
      list.innerHTML = visible.map((a, i) => `
        <div class="article-row" id="art-${a.id}">
          <div class="article-info">
            <div class="article-headline">${escapeHtml(a.headline)}</div>
            <div class="article-sub">${escapeHtml(a.subheadline)}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button class="btn-edit" onclick="editArticle(${i})">ערוך</button>
            <button class="btn-danger" onclick="deleteArticle('${a.id}')">מחק</button>
          </div>
        </div>
      `).join('') + (hasMore ? `
        <button class="btn-primary" onclick="loadMore()" style="width:100%;margin-top:6px;">
          טען עוד (${articles.length - displayLimit} נותרו)
        </button>
      ` : '');
    }

    function loadMore() {
      displayLimit += 5;
      renderArticles();
    }

    // ── Edit article ──────────────────────────────────────────────────────────
    function editArticle(index) {
      const a = allLoadedArticles[index];
      editingId = a.id;
      document.getElementById('artHeadline').value = a.headline;
      document.getElementById('artSubheadline').value = a.subheadline;
      document.getElementById('artImageUrl').value = a.imageUrl;
      document.getElementById('artLink').value = a.link;
      document.getElementById('addArticleBtn').textContent = 'עדכן מאמר';
      document.getElementById('editModeBanner').style.display = 'flex';
      document.getElementById('addArticleSection').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('artHeadline').value = '';
      document.getElementById('artSubheadline').value = '';
      document.getElementById('artImageUrl').value = '';
      document.getElementById('artLink').value = '';
      document.getElementById('addArticleBtn').textContent = 'הוסף מאמר';
      document.getElementById('editModeBanner').style.display = 'none';
    }

    // ── Add article ───────────────────────────────────────────────────────────
    async function addArticle() {
      const headline    = document.getElementById('artHeadline').value.trim();
      const subheadline = document.getElementById('artSubheadline').value.trim();
      const imageUrl    = document.getElementById('artImageUrl').value.trim();
      const link        = document.getElementById('artLink').value.trim();

      if (!headline || !subheadline || !imageUrl || !link) {
        showToast('מלא את כל השדות', 'error');
        return;
      }

      const btn = document.getElementById('addArticleBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> שומר...';

      try {
        const articles = await readArticlesFile();
        let updated;
        if (editingId) {
          updated = articles.map(a => a.id === editingId
            ? { ...a, headline, subheadline, imageUrl, link }
            : a
          );
        } else {
          updated = [{ id: crypto.randomUUID(), headline, subheadline, imageUrl, link, createdAt: new Date().toISOString() }, ...articles];
        }
        await writeArticlesFile(updated);
        const wasEditing = !!editingId;
        allLoadedArticles = updated;
        if (!wasEditing) displayLimit = 5;
        cancelEdit();
        renderArticles();
        showToast(wasEditing ? 'המאמר עודכן בהצלחה' : 'המאמר נוסף בהצלחה', 'success');
      } catch (e) {
        showToast(`שגיאה: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'הוסף מאמר';
      }
    }

    // ── Delete article ────────────────────────────────────────────────────────
    async function deleteArticle(id) {
      if (!confirm('האם למחוק את המאמר?')) return;

      try {
        const articles = await readArticlesFile();
        const updated = articles.filter(a => a.id !== id);
        await writeArticlesFile(updated);
        allLoadedArticles = updated;
        renderArticles();
        showToast('המאמר נמחק', 'success');
      } catch (e) {
        showToast(`שגיאה: ${e.message}`, 'error');
      }
    }

    // ── Logout ────────────────────────────────────────────────────────────────
    function logout() {
      if (!confirm('להתנתק?')) return;
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadArticles();
  </script>
</body>
</html>
