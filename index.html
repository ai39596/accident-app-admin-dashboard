<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcciEasy Admin — כניסה</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: #1d4ed8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
    }

    .logo-text { font-size: 20px; font-weight: 800; color: #0f172a; }
    .logo-sub  { font-size: 12px; color: #64748b; font-weight: 500; }

    h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }

    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s;
      background: #f8fafc;
      font-family: inherit;
      text-align: right;
    }

    input:focus { border-color: #1d4ed8; background: #fff; }
    input::placeholder { color: #94a3b8; }

    .hint { font-size: 11px; color: #94a3b8; margin-top: 5px; }

    .btn {
      width: 100%;
      padding: 13px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn:hover  { background: #1e40af; }
    .btn:active { background: #1e3a8a; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🚗</div>
      <div>
        <div class="logo-text">AcciEasy</div>
        <div class="logo-sub">פאנל ניהול</div>
      </div>
    </div>

    <h1>כניסה לפאנל</h1>
    <p class="subtitle">הכנס את פרטי הגישה שלך להמשך</p>

    <div id="errorMsg" class="error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="githubToken">GitHub Personal Access Token</label>
        <input
          type="password"
          id="githubToken"
          placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          autocomplete="off"
          required
        />
        <div class="hint">נדרשת הרשאת Contents: write על ה-repo של המאמרים</div>
      </div>

      <div class="field">
        <label for="githubRepo">שם ה-repo של המאמרים</label>
        <input
          type="text"
          id="githubRepo"
          placeholder="username/accieasy-articles"
          required
        />
        <div class="hint">לדוגמה: ai39596/accieasy-articles</div>
      </div>

      <div class="field">
        <label for="serverUrl">כתובת ה-Server</label>
        <input
          type="url"
          id="serverUrl"
          placeholder="https://accieasy-server.onrender.com"
          required
        />
      </div>

      <button type="submit" class="btn">כניסה לדשבורד</button>
    </form>
  </div>

  <script>
    // Already logged in — go straight to dashboard
    if (localStorage.getItem('githubToken') && localStorage.getItem('githubRepo') && localStorage.getItem('serverUrl')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const githubToken = document.getElementById('githubToken').value.trim();
      const githubRepo  = document.getElementById('githubRepo').value.trim();
      const serverUrl   = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');

      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!githubToken || !githubRepo || !serverUrl) {
        errorMsg.textContent = 'יש למלא את כל השדות';
        errorMsg.style.display = 'block';
        return;
      }

      if (!githubRepo.includes('/')) {
        errorMsg.textContent = 'שם ה-repo חייב להיות בפורמט username/repo-name';
        errorMsg.style.display = 'block';
        return;
      }

      localStorage.setItem('githubToken', githubToken);
      localStorage.setItem('githubRepo',  githubRepo);
      localStorage.setItem('serverUrl',   serverUrl);

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
